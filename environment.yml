name: damping-wings
channels:
  - conda-forge
  - defaults
dependencies:
  # ── Python ──────────────────────────────────────────────────────────────────
  - python=3.11

  # ── C system libraries required by py21cmfast ────────────────────────────────
  - fftw>=3.3
  - gsl>=2.7
  - compilers          # gcc/gxx toolchain for C extensions
  - pkg-config

  # ── Core scientific Python stack ─────────────────────────────────────────────
  - click
  - pyyaml
  - cffi
  - attrs

  # ── Package-specific dependencies ────────────────────────────────────────────
  - ordered-set>=4.1
  - tabulate>=0.9
  - tqdm>=4.65

  # ── pip-installed packages ────────────────────────────────────────────────────
  - pip
  - pip:
    - 21cmFAST
    - hmf
    - hatchling
