name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install C dependencies for py21cmfast
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev libfftw3-dev pkg-config

      - name: Install package and dev tools
        run: |
          pip install hatchling
          pip install 21cmFAST hmf
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/

      - name: Run type checker
        run: mypy src/damping_wings/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short